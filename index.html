<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇧🇷 Brasil Rumo ao Hexa - Copa do Mundo 2026</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(0, 70, 25, 0.88), rgba(0, 20, 8, 0.95)),
                url("https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1920");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            text-align: center;
        }

        .topo {
            margin-bottom: 25px;
        }

        .bandeiras {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .titulo {
            color: #ffdf00;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow:
                0 0 10px #ffdf00,
                0 0 20px #ffdf00,
                0 0 40px rgba(255, 223, 0, .8);
            margin-bottom: 10px;
        }

        .subtitulo {
            color: #ffffff;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .copa-badge {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(90deg, #009c3b, #002776);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            border: 2px solid #ffdf00;
            box-shadow: 0 0 20px rgba(255, 223, 0, .5);
            margin-bottom: 25px;
        }

        .player-container {
            background: rgba(0, 0, 0, 0.65);
            border: 4px solid #ffdf00;
            border-radius: 25px;
            overflow: hidden;
            box-shadow:
                0 0 30px rgba(255, 223, 0, .6),
                0 0 60px rgba(255, 223, 0, .2);
            backdrop-filter: blur(8px);
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }

        .footer {
            margin-top: 25px;
            color: white;
        }

        .footer h3 {
            color: #ffdf00;
            margin-bottom: 8px;
        }

        .footer p {
            opacity: .9;
        }

        .hexa {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffdf00;
            animation: brilho 2s infinite alternate;
        }

        @keyframes brilho {
            from {
                text-shadow: 0 0 5px #ffdf00;
            }

            to {
                text-shadow:
                    0 0 10px #ffdf00,
                    0 0 20px #ffdf00,
                    0 0 35px #ffdf00;
            }
        }

        @media (max-width: 768px) {
            .titulo {
                font-size: 2rem;
            }

            .subtitulo {
                font-size: 1rem;
            }

            .bandeiras {
                font-size: 30px;
            }

            .copa-badge {
                font-size: 14px;
                padding: 10px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="topo">
            <div class="bandeiras">
                🇧🇷 ⚽ 🏆
            </div>

            <h1 class="titulo">
                Brasil Rumo ao Hexa
            </h1>

            <p class="subtitulo">
                Copa do Mundo FIFA 2026
            </p>

            <div class="copa-badge">
                AO VIVO • TRANSMISSÃO ONLINE
            </div>
        </div>

        <div class="player-container">
            <iframe
                name="Player"
                src="//%72%65%64%65%63%61%6E%61%69%73%74%76%2E%72%6F%64%65%6F/player3/ch.php?canal=cazetv1"
                allow="encrypted-media"
                allowfullscreen>
            </iframe>
        </div>

        <div class="footer">
            <h3>🇧🇷 Seleção Brasileira</h3>
            <p>Assista aos jogos e acompanhe a caminhada rumo ao HEXACAMPEONATO.</p>

            <div class="hexa">
                ⭐ ⭐ ⭐ ⭐ ⭐ ➜ ⭐⭐⭐⭐⭐⭐
            </div>
        </div>

    </div>

</body>

</html>
