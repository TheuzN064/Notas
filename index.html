<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucena na Copa</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #22c55e;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }

        p {
            color: #cbd5e1;
            margin-bottom: 30px;
        }

        .player-box {
            background: #111827;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .player-box iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 12px;
        }

        .footer {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>⚽ Lucena na Copa</h1>
        <p>Assista aos jogos ao vivo</p>

        <div class="player-box">
            <iframe
                name="Player"
                src="//%72%65%64%65%63%61%6E%61%69%73%74%76%2E%72%6F%64%65%6F/player3/ch.php?canal=cazetv1"
                allow="encrypted-media"
                allowfullscreen>
            </iframe>
        </div>

        <div class="footer">
            © 2026 Lucena na Copa
        </div>
    </div>

</body>

</html>
